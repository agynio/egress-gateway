syntax = "proto3";

package agynio.api.secrets.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/agynio/api/gen/agynio/api/secrets/v1;secretsv1";

// SecretsService manages secret providers and secrets.
//
// Secret providers represent connections to external secret management systems
// (e.g. HashiCorp Vault). Secrets are internal references to values stored in
// those external systems. The service never persists secret values - it resolves
// them on demand via the ResolveSecret RPC.
service SecretsService {
  // --- Secret Providers ---
  rpc CreateSecretProvider(CreateSecretProviderRequest) returns (CreateSecretProviderResponse);
  rpc GetSecretProvider(GetSecretProviderRequest) returns (GetSecretProviderResponse);
  rpc UpdateSecretProvider(UpdateSecretProviderRequest) returns (UpdateSecretProviderResponse);
  rpc DeleteSecretProvider(DeleteSecretProviderRequest) returns (DeleteSecretProviderResponse);
  rpc ListSecretProviders(ListSecretProvidersRequest) returns (ListSecretProvidersResponse);

  // --- Secrets ---
  rpc CreateSecret(CreateSecretRequest) returns (CreateSecretResponse);
  rpc GetSecret(GetSecretRequest) returns (GetSecretResponse);
  rpc UpdateSecret(UpdateSecretRequest) returns (UpdateSecretResponse);
  rpc DeleteSecret(DeleteSecretRequest) returns (DeleteSecretResponse);
  rpc ListSecrets(ListSecretsRequest) returns (ListSecretsResponse);

  // --- Resolution ---
  // Resolve a secret to its actual value by fetching from the external provider.
  rpc ResolveSecret(ResolveSecretRequest) returns (ResolveSecretResponse);
  // Verify that a secret exists without resolving its value.
  rpc ResolveSecretExists(ResolveSecretExistsRequest) returns (ResolveSecretExistsResponse);

  // --- Image Pull Secrets ---
  rpc CreateImagePullSecret(CreateImagePullSecretRequest) returns (CreateImagePullSecretResponse);
  rpc GetImagePullSecret(GetImagePullSecretRequest) returns (GetImagePullSecretResponse);
  rpc UpdateImagePullSecret(UpdateImagePullSecretRequest) returns (UpdateImagePullSecretResponse);
  rpc DeleteImagePullSecret(DeleteImagePullSecretRequest) returns (DeleteImagePullSecretResponse);
  rpc ListImagePullSecrets(ListImagePullSecretsRequest) returns (ListImagePullSecretsResponse);

  // --- Image Pull Secret Resolution ---
  rpc ResolveImagePullSecret(ResolveImagePullSecretRequest) returns (ResolveImagePullSecretResponse);
}

// ===========================================================================
// Common
// ===========================================================================

// Metadata shared by every resource.
message EntityMeta {
  string id = 1; // UUID
  google.protobuf.Timestamp created_at = 2;
  google.protobuf.Timestamp updated_at = 3;
}

// ===========================================================================
// Enums
// ===========================================================================

enum SecretProviderType {
  SECRET_PROVIDER_TYPE_UNSPECIFIED = 0;
  SECRET_PROVIDER_TYPE_VAULT = 1;
}

// ===========================================================================
// Secret Provider
// ===========================================================================

message VaultConfig {
  string address = 1; // Vault server address (e.g. "http://vault:8200")
  // Authentication token. Sensitive - the implementation layer must
  // encrypt this field at rest and redact it in read responses.
  string token = 2;
}

message SecretProviderConfig {
  oneof provider {
    VaultConfig vault = 1;
  }
}

message SecretProvider {
  EntityMeta meta = 1;
  string title = 2;
  string description = 3;
  // Provider type. Must be consistent with the config oneof branch
  // (e.g. SECRET_PROVIDER_TYPE_VAULT requires config.vault to be set).
  // The server validates this invariant on Create and Update.
  SecretProviderType type = 4;
  SecretProviderConfig config = 5;
}

message CreateSecretProviderRequest {
  string title = 1;
  string description = 2;
  SecretProviderType type = 3;
  SecretProviderConfig config = 4; // required
  string organization_id = 5;
}

message CreateSecretProviderResponse {
  SecretProvider secret_provider = 1;
}

message GetSecretProviderRequest {
  string id = 1; // UUID
}

message GetSecretProviderResponse {
  SecretProvider secret_provider = 1;
}

message UpdateSecretProviderRequest {
  string id = 1; // UUID
  optional string title = 2;
  optional string description = 3;
  optional SecretProviderConfig config = 4;
}

message UpdateSecretProviderResponse {
  SecretProvider secret_provider = 1;
}

message DeleteSecretProviderRequest {
  string id = 1; // UUID
}

message DeleteSecretProviderResponse {}

message ListSecretProvidersRequest {
  int32 page_size = 1;
  string page_token = 2;
  string organization_id = 3;
}

message ListSecretProvidersResponse {
  repeated SecretProvider secret_providers = 1;
  string next_page_token = 2;
}

// ===========================================================================
// Secret
// ===========================================================================

message Secret {
  EntityMeta meta = 1;
  string title = 2;
  string description = 3;
  string secret_provider_id = 4; // UUID - reference to a SecretProvider
  string remote_name = 5; // Provider-specific identifier (e.g. "secret/platform/keys/api_key" for Vault)
  string value = 6; // Local encrypted value (mutually exclusive with secret_provider_id + remote_name)
}

message CreateSecretRequest {
  string title = 1;
  string description = 2;
  string secret_provider_id = 3; // UUID - required when not supplying value
  string remote_name = 4; // required when not supplying value
  string organization_id = 5;
  string value = 6; // Local encrypted value (mutually exclusive with secret_provider_id + remote_name)
}

message CreateSecretResponse {
  Secret secret = 1;
}

message GetSecretRequest {
  string id = 1; // UUID
}

message GetSecretResponse {
  Secret secret = 1;
}

message UpdateSecretRequest {
  string id = 1; // UUID
  optional string title = 2;
  optional string description = 3;
  // Changing secret_provider_id or remote_name re-binds this secret
  // to a different external value. Consumers referencing the old
  // binding should be aware of this change.
  optional string secret_provider_id = 4;
  optional string remote_name = 5;
  optional string value = 6; // Local encrypted value (mutually exclusive with secret_provider_id + remote_name)
}

message UpdateSecretResponse {
  Secret secret = 1;
}

message DeleteSecretRequest {
  string id = 1; // UUID
}

message DeleteSecretResponse {}

message ListSecretsRequest {
  int32 page_size = 1;
  string page_token = 2;
  string secret_provider_id = 3; // optional filter by provider
  string organization_id = 4;
}

message ListSecretsResponse {
  repeated Secret secrets = 1;
  string next_page_token = 2;
}

// ===========================================================================
// Resolution
// ===========================================================================

message ResolveSecretRequest {
  string id = 1; // UUID of the Secret to resolve
}

message ResolveSecretResponse {
  string value = 1; // The resolved secret value from the external provider
}

message ResolveSecretExistsRequest {
  string id = 1; // UUID of the Secret to check
}

message ResolveSecretExistsResponse {
  bool exists = 1;
  string organization_id = 2;
}

// ===========================================================================
// Image Pull Secret
// ===========================================================================

message RemoteSecretRef {
  string value_provider_id = 1;
  string value_reference = 2;
}

message ImagePullSecret {
  EntityMeta meta = 1;
  string description = 2;
  string registry = 3;
  string username = 4;
  oneof source {
    string value = 5;
    RemoteSecretRef remote = 6;
  }
}

message CreateImagePullSecretRequest {
  string description = 1;
  string registry = 2;
  string username = 3;
  oneof source {
    string value = 4;
    RemoteSecretRef remote = 5;
  }
  string organization_id = 6;
}

message CreateImagePullSecretResponse {
  ImagePullSecret image_pull_secret = 1;
}

message GetImagePullSecretRequest {
  string id = 1; // UUID
}

message GetImagePullSecretResponse {
  ImagePullSecret image_pull_secret = 1;
}

message UpdateImagePullSecretRequest {
  string id = 1; // UUID
  optional string description = 2;
  optional string registry = 3;
  optional string username = 4;
  oneof source {
    string value = 5;
    RemoteSecretRef remote = 6;
  }
}

message UpdateImagePullSecretResponse {
  ImagePullSecret image_pull_secret = 1;
}

message DeleteImagePullSecretRequest {
  string id = 1; // UUID
}

message DeleteImagePullSecretResponse {}

message ListImagePullSecretsRequest {
  int32 page_size = 1;
  string page_token = 2;
  string organization_id = 3;
}

message ListImagePullSecretsResponse {
  repeated ImagePullSecret image_pull_secrets = 1;
  string next_page_token = 2;
}

// ===========================================================================
// Image Pull Secret Resolution
// ===========================================================================

message ResolveImagePullSecretRequest {
  string id = 1; // UUID of the ImagePullSecret to resolve
}

message ResolveImagePullSecretResponse {
  string registry = 1;
  string username = 2;
  string password = 3;
}

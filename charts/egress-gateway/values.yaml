nameOverride: ""
fullnameOverride: ""

global:
  imageRegistry: ""
  imagePullSecrets: []

image:
  registry: ""
  repository: ghcr.io/agynio/egress-gateway
  tag: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

replicaCount: 1
revisionHistoryLimit: 10
updateStrategy:
  type: RollingUpdate

deploymentAnnotations: {}

serviceAccount:
  create: true
  name: ""
  annotations: {}

automountServiceAccountToken: true

rbac:
  create: false
  clusterWide: false
  rules: []

podAnnotations: {}
podLabels: {}

podSecurityContext:
  enabled: false
  fsGroup: null

securityContext:
  enabled: true
  runAsNonRoot: true
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

priorityClassName: ""
terminationGracePeriodSeconds: null

service:
  enabled: true
  type: ClusterIP
  annotations: {}
  labels: {}
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP

containerPorts:
  - name: grpc
    containerPort: 50051
    protocol: TCP

command: []
args: []
env:
  - name: GRPC_ADDRESS
    value: ":50051"
  - name: EGRESS_ADDRESS
    value: "egress:50051"
  - name: SECRETS_SERVICE_ADDRESS
    value: "secrets:50051"
  - name: NOTIFICATIONS_ADDRESS
    value: "notifications:50051"
  - name: METERING_ADDRESS
    value: "metering:50051"
  - name: TRACING_ADDRESS
    value: "tracing:50051"
  - name: ZITI_IDENTITY_FILE
    value: "/var/lib/ziti/identity.json"
  - name: EGRESS_CA_CERT_FILE
    value: "/var/lib/egress-ca/tls.crt"
  - name: EGRESS_CA_KEY_FILE
    value: "/var/lib/egress-ca/tls.key"
  - name: RULE_CACHE_TTL
    value: "15s"
  - name: SECRET_CACHE_TTL
    value: "15s"
envFrom: []
extraEnvVars: []
extraEnvVarsCM: ""
extraEnvVarsSecret: ""

configMounts: []
extraVolumeMounts:
  - name: ziti-identity
    mountPath: /var/lib/ziti
    readOnly: true
  - name: egress-ca
    mountPath: /var/lib/egress-ca
    readOnly: true
extraVolumes:
  - name: ziti-identity
    secret:
      secretName: egress-gateway-ziti-identity
  - name: egress-ca
    secret:
      secretName: egress-ca

initContainers: []
extraContainers: []

lifecycle: {}

livenessProbe:
  enabled: true
  tcpSocket:
    port: grpc
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 1
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  enabled: true
  tcpSocket:
    port: grpc
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 1
  failureThreshold: 3
  successThreshold: 1

startupProbe:
  enabled: false

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: null
  metrics: []
  behavior: {}

pdb:
  enabled: false
  minAvailable: null
  maxUnavailable: null

metrics:
  enabled: false
  serviceMonitor:
    enabled: false
    namespace: ""
    interval: ""
    scrapeTimeout: ""
    honorLabels: false
    labels: {}
    annotations: {}
    relabelings: []
    metricRelabelings: []
    endpoints:
      - port: grpc
        path: /metrics
        interval: ""
        scrapeTimeout: ""

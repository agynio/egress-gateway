version: v1

plugins:
  - plugin: go
    out: .gen/go
    opt:
      - paths=source_relative
      - Magynio/api/agents/v1/agents.proto=github.com/agynio/egress-gateway/.gen/go/agynio/api/agents/v1
      - Magynio/api/egress/v1/egress.proto=github.com/agynio/egress-gateway/.gen/go/agynio/api/egress/v1
      - Magynio/api/identity/v1/identity.proto=github.com/agynio/egress-gateway/.gen/go/agynio/api/identity/v1
      - Magynio/api/metering/v1/metering.proto=github.com/agynio/egress-gateway/.gen/go/agynio/api/metering/v1
      - Magynio/api/notifications/v1/notifications.proto=github.com/agynio/egress-gateway/.gen/go/agynio/api/notifications/v1
      - Magynio/api/secrets/v1/secrets.proto=github.com/agynio/egress-gateway/.gen/go/agynio/api/secrets/v1
      - Magynio/api/tracing/v1/tracing.proto=github.com/agynio/egress-gateway/.gen/go/agynio/api/tracing/v1
      - Magynio/api/ziti_management/v1/ziti_management.proto=github.com/agynio/egress-gateway/.gen/go/agynio/api/ziti_management/v1
  - plugin: go-grpc
    out: .gen/go
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false
      - Magynio/api/agents/v1/agents.proto=github.com/agynio/egress-gateway/.gen/go/agynio/api/agents/v1
      - Magynio/api/egress/v1/egress.proto=github.com/agynio/egress-gateway/.gen/go/agynio/api/egress/v1
      - Magynio/api/identity/v1/identity.proto=github.com/agynio/egress-gateway/.gen/go/agynio/api/identity/v1
      - Magynio/api/metering/v1/metering.proto=github.com/agynio/egress-gateway/.gen/go/agynio/api/metering/v1
      - Magynio/api/notifications/v1/notifications.proto=github.com/agynio/egress-gateway/.gen/go/agynio/api/notifications/v1
      - Magynio/api/secrets/v1/secrets.proto=github.com/agynio/egress-gateway/.gen/go/agynio/api/secrets/v1
      - Magynio/api/tracing/v1/tracing.proto=github.com/agynio/egress-gateway/.gen/go/agynio/api/tracing/v1
      - Magynio/api/ziti_management/v1/ziti_management.proto=github.com/agynio/egress-gateway/.gen/go/agynio/api/ziti_management/v1

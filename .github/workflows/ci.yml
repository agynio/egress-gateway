name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gcc

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Generate, lint, test, and build
        run: make ci

      - name: Validate Helm chart
        run: |
          helm dependency update charts/egress-gateway
          helm lint charts/egress-gateway
          helm template egress-gateway charts/egress-gateway

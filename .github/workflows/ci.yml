name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gcc

      - name: Set up Buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: '1.67.0'

      - name: Install protobuf generators
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Generate, lint, test, and build
        run: make ci

      - name: Validate Helm chart
        run: |
          helm dependency update charts/egress-gateway
          helm lint charts/egress-gateway
          helm template egress-gateway charts/egress-gateway

  image:
    name: Build and publish PR image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push PR image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/agynio/egress-gateway:pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          cache-from: type=gha,scope=egress-gateway
          cache-to: type=gha,scope=egress-gateway,mode=max
